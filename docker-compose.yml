services:
  opensearch:
    build:
      context: ./docker/opensearch
    container_name: search-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ./opensearch-config/synonyms_ko.txt:/usr/share/opensearch/config/synonyms_ko.txt
      - ./opensearch-config/synonyms_en.txt:/usr/share/opensearch/config/synonyms_en.txt
      - ./opensearch-config/user_dict_ko.txt:/usr/share/opensearch/config/user_dict_ko.txt
    ports:
      - "9200:9200"
    mem_limit: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2
    container_name: search-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    mem_limit: 1g
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: search-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-searchdb}
      - POSTGRES_USER=${POSTGRES_USER:-search}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-search}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: search-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    mem_limit: 512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: search-api
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-search}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-searchdb}
      - REDIS_URL=redis://redis:6379/0
      - DOCUMENT_ROOT=/data/documents
      - PREVIEW_CACHE=/data/preview-cache
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      - INITIAL_ADMIN_USERNAME=${INITIAL_ADMIN_USERNAME:-admin}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD:-admin}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL:-admin@localhost}
    volumes:
      - documents:/data/documents
      - preview-cache:/data/preview-cache
    ports:
      - "8000:8000"
    mem_limit: 2g
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: search-worker
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-search}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-searchdb}
      - REDIS_URL=redis://redis:6379/0
      - DOCUMENT_ROOT=/data/documents
      - PREVIEW_CACHE=/data/preview-cache
    volumes:
      - documents:/data/documents
      - preview-cache:/data/preview-cache
    mem_limit: 4g
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  file-watcher:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: search-watcher
    command: python -m workers.file_watcher
    environment:
      - REDIS_URL=redis://redis:6379/0
      - WATCH_DIR=/data/documents
    volumes:
      - documents:/data/documents
    mem_limit: 256m
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  opensearch-data:
  postgres-data:
  redis-data:
  documents:
  preview-cache:
