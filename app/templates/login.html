<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - DocSearch</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-6">DocSearch</h1>

        {% if error %}
        <div class="bg-red-50 text-red-600 px-4 py-2 rounded mb-4 text-sm">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">사용자명</label>
                <input type="text" name="username" required autofocus
                       class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                <input type="password" name="password" required
                       class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 min-h-[44px]">
                로그인
            </button>
        </form>
    </div>
</body>
</html>
